---
name: Question
description: Ask a usage or design question about spiderw.
title: "question: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Questions are welcome. For bug reports or feature requests, please use
        the dedicated templates instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description:
        Include code, commands, environment details, or the part of the docs you
        are looking at.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and documentation first.
          required: true
