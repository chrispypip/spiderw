---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# The Go version is single-sourced from go.mod (jobs use go-version-file), so it
# never drifts from the module's declared toolchain. golangci-lint is pinned
# here and in dev/Dockerfile.dev; Renovate keeps the two in sync
# (see renovate.json).
env:
  GOLANGCI_LINT_VERSION: "v2.12.2"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build + vet gate. Fast failure before the heavier test jobs run.
  # ---------------------------------------------------------------------------
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...

  # ---------------------------------------------------------------------------
  # Lint + formatting. golangci-lint v2 also runs the configured formatters
  # (gofmt, goimports), so this job covers both linting and format checking.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  # ---------------------------------------------------------------------------
  # Spell-check comments, strings, and Markdown docs with codespell. Complements
  # the golangci-lint `misspell` linter (Go files only) by also covering the
  # docs. Configuration (skip list, ignore words) lives in .codespellrc.
  # ---------------------------------------------------------------------------
  spell:
    name: spell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: codespell-project/actions-codespell@v2

  # ---------------------------------------------------------------------------
  # This project writes plain ASCII: no em dashes, ellipses, arrows, or other
  # typographic punctuation, in code, comments, docs, or printed strings. They
  # are easy to introduce by copy-paste and awkward to grep for, so keep them out.
  # ---------------------------------------------------------------------------
  ascii:
    name: ascii
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ascii-check
        run: ./scripts/ascii-check.sh

  # ---------------------------------------------------------------------------
  # Native test suites that do NOT require D-Bus. One matrix leg per build tag
  # so each suite reports independently. (The `race` tag is intentionally not
  # here: internal/connect/race_test.go drives the iwd mock over a session bus,
  # so the race suite runs in the D-Bus job below.)
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.suite.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            cmd: go test -tags=unit ./...
          # NOTE: no -race here. The -race flag also enables the `race` BUILD TAG,
          # which pulls in the race-tagged files - and internal/connect's drive the
          # iwd mock over a session bus, which this job does not have. Stress runs
          # under the race detector in the D-Bus job below, where a bus exists.
          - name: stress
            cmd: go test -tags=stress -timeout=1m ./...
          - name: regression
            cmd: go test -tags=regression ./...
          - name: bench
            cmd: go test -tags=bench -bench=. -benchmem -benchtime=1x
                 -run='^$' ./...
          # The fuzz tier is build-tagged, so `go build`/`go vet`/the other
          # suites never compile it: a fuzz target that stops compiling would
          # rot unnoticed. Run the seed corpus (which type-checks and executes
          # every target), then fuzz each target briefly so new crashes are
          # actually found.
          - name: fuzz
            cmd: go test -tags=fuzz ./... && ./scripts/fuzz.sh 1s
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: ${{ matrix.suite.name }}
        run: ${{ matrix.suite.cmd }}

  # ---------------------------------------------------------------------------
  # Suites that require a session bus: the integration suite (pure-Go iwd mock)
  # and the race suite (internal/connect drives the mock under concurrency).
  # Running race over ./... here still covers the non-D-Bus packages too.
  #
  # The mock harness builds the mock by import path and embeds its introspection
  # XML, so these run from the default checkout with no special layout.
  # ---------------------------------------------------------------------------
  dbus:
    name: dbus tests (race + integration)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install D-Bus
        run: sudo apt-get update && sudo apt-get install -y dbus
      - name: Race suite under a session bus
        run: dbus-run-session -- go test -race -tags=race ./...
      # Stress tests carry no assertions by design - they hammer the fakes and rely
      # on the runtime to complain - so without the race detector they only catch
      # panics and deadlocks. They run under it here, not in the native matrix,
      # because -race also enables the `race` build tag and those tests need a bus.
      - name: Stress suite under the race detector and a session bus
        run: dbus-run-session -- go test -race -tags=stress -timeout=5m ./...
      - name: Integration suite under a session bus
        run: dbus-run-session -- go test -tags=integration ./...

  # ---------------------------------------------------------------------------
  # Cross-compile check. Proves the CLI builds for every target platform
  # without producing an artifact - releasing the binary is a later step,
  # gated on hardware testing that doesn't exist yet. This is pure build
  # confidence, so it runs on PRs too and feeds the gate below.
  # ---------------------------------------------------------------------------
  cross-compile:
    name: cross-compile (linux/${{ matrix.goarch }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build CLI for linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o /dev/null ./cmd/spiderw

  # ---------------------------------------------------------------------------
  # Promotion gate. A single required status that is green only when every
  # host/mock gate above passed. This is the anchor for branch protection and,
  # later, for the "release is ready" notification (a workflow_run keyed off
  # this job, once the hardware gate lands after Station). It deliberately does
  # NOT cover real-iwd hardware testing - that is a separate, later gate.
  # ---------------------------------------------------------------------------
  mock-gates:
    name: mock gates green
    if: always()
    needs: [build, lint, spell, test, dbus, cross-compile]
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every gate passed
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more CI gates did not pass:"
          echo '${{ toJSON(needs) }}'
          exit 1
      - run: echo "All host/mock CI gates passed."
