---
name: release

# Publish the spiderw CLI on a version tag. GoReleaser cross-compiles the CLI
# (see .goreleaser.yaml) and attaches the archives and checksums to a GitHub
# Release. Nothing here builds on a branch push, so a tag is the only trigger.

# yamllint disable-line rule:truthy
on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create the release and upload assets

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # GoReleaser needs full history and tags for the changelog.
          fetch-depth: 0
      # yamllint disable-line rule:line-length
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
      # yamllint disable-line rule:line-length
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
