---
name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run weekly to keep the published Scorecard result fresh.
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      # Needed for publishing results to api.scorecard.dev.
      id-token: write
      # Needed for uploading SARIF results to GitHub code scanning.
      security-events: write
      contents: read
      issues: read
      pull-requests: read
      checks: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
