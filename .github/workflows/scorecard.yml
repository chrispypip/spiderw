---
name: OpenSSF Scorecard

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  schedule:
    # Run weekly to keep the published Scorecard result fresh.
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      # Needed for publishing results to api.scorecard.dev.
      id-token: write
      # Needed for uploading SARIF results to GitHub code scanning.
      security-events: write
      contents: read
      issues: read
      pull-requests: read
      checks: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      # yamllint disable-line rule:line-length
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # yamllint disable-line rule:line-length
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: results.sarif
