---
# golangci-lint configuration for spiderw.
#
# Schema is golangci-lint v2. The dev container installs golangci-lint via
# `@latest` (currently a v2 release) and CI pins the same major version, so this
# file is the single source of truth for both `make lint` and the CI lint job.
version: "2"

run:
  # All build tags used by the test suites, so test files behind
  # `//go:build <tag>` constraints are also analyzed.
  build-tags:
    - unit
    - race
    - stress
    - bench
    - integration
    - regression

linters:
  # `standard` enables errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - durationcheck             # suspicious time.Duration arithmetic
    - errname                   # error vars are ErrXxx, error types are XxxError
    - errorlint                 # correct error wrapping / comparison (errors.Is/As, %w)
    - gocheckcompilerdirectives # valid //go: directives (catches build-tag typos)
    - makezero                  # append to a slice made with a non-zero length
    - misspell                  # commonly misspelled English in comments and strings
    - nilerr                    # returning nil after a non-nil error check
    - thelper                   # test helpers start with t.Helper()
    - unconvert                 # unnecessary type conversions
    - unparam                   # unused function parameters and results
    - wastedassign              # assignments overwritten before being read
  settings:
    errcheck:
      # Writes to CLI output streams: a failed stdout/stderr write is not
      # actionable, and checking every Fprint call adds noise without value.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      # Deferred Close() in tests and benchmarks: the result is not meaningful
      # to a test teardown path.
      - linters:
          - errcheck
        path: _test\.go
        text: "Error return value of `.*\\.Close` is not checked"
      # Test fakes and helpers routinely accept interface-required parameters
      # (ctx, sender, ...) they do not use, so scope unparam to non-test code
      # where an unused parameter is a real smell.
      - linters:
          - unparam
        path: _test\.go

issues:
  # Show every finding rather than golangci-lint's default truncated subset
  # (50 per linter, 3 per identical message), so neither `make lint` nor the CI
  # lint job hides findings behind the caps.
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
